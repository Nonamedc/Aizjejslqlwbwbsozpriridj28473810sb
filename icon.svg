<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1220"/>
      <stop offset="100%" stop-color="#0c0810"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a054"/>
      <stop offset="100%" stop-color="#c44d6e"/>
    </linearGradient>
    <linearGradient id="mark" x1="135deg" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a054"/>
      <stop offset="100%" stop-color="#c44d6e"/>
    </linearGradient>
  </defs>
  <!-- Fond -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Lettre A principale -->
  <text
    x="256" y="320"
    font-family="Georgia, serif"
    font-size="280"
    font-weight="300"
    font-style="italic"
    text-anchor="middle"
    fill="url(#grad)"
    letter-spacing="-4"
  >A</text>
  <!-- Trait décoratif bas -->
  <rect x="140" y="370" width="232" height="2" rx="1" fill="url(#grad)" opacity="0.4"/>
  <!-- Point en bas -->
  <circle cx="256" cy="390" r="5" fill="url(#grad)" opacity="0.7"/>
</svg>
